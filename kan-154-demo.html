<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAN-154 Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 1rem; }
        .result {
            font-size: 4rem;
            font-weight: bold;
            color: #2563eb;
        }
        .expression {
            font-size: 1.5rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Demo Task</h1>
        <div class="expression">5 + 1 =</div>
        <div class="result">6</div>
    </div>
</body>
</html>
