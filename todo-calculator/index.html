<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            padding: 36px 32px 32px;
        }

        .app h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 6px;
        }

        .app .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #f0f0f5;
            border-radius: 10px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #fff;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .tab:hover:not(.active) {
            color: #555;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* Todo Section */
        .todo-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .todo-input-row input {
            flex: 1;
            padding: 12px 14px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }

        .todo-input-row input:focus {
            border-color: #f5576c;
            background: #fff;
        }

        .add-btn {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .add-btn:hover {
            opacity: 0.92;
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .todo-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13px;
            color: #888;
        }

        .todo-stats .count {
            font-weight: 600;
            color: #1a1a2e;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #f5576c;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #fef0f0;
        }

        .todo-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .todo-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .todo-list li:hover {
            background: #f8f8fc;
        }

        .todo-list li + li {
            border-top: 1px solid #f0f0f5;
        }

        .todo-list li .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #d0d0de;
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .todo-list li .checkbox.checked {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: #f5576c;
        }

        .todo-list li .checkbox.checked::after {
            content: '✓';
            color: #fff;
            font-size: 13px;
            font-weight: 700;
        }

        .todo-list li .todo-text {
            flex: 1;
            font-size: 15px;
            color: #333;
            word-break: break-word;
        }

        .todo-list li .todo-text.done {
            text-decoration: line-through;
            color: #bbb;
        }

        .todo-list li .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
            line-height: 1;
        }

        .todo-list li .delete-btn:hover {
            color: #f5576c;
            background: #fef0f0;
        }

        .todo-empty {
            text-align: center;
            padding: 40px 20px;
            color: #bbb;
            font-size: 14px;
        }

        /* Calculator Section */
        .calc-display {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 16px;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .calc-display .expression {
            font-size: 14px;
            color: #8888aa;
            min-height: 20px;
            word-break: break-all;
            text-align: right;
            width: 100%;
        }

        .calc-display .result {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            word-break: break-all;
            text-align: right;
            width: 100%;
            transition: font-size 0.1s;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .calc-btn {
            padding: 18px 0;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        .calc-btn.num {
            background: #f5f5fa;
            color: #1a1a2e;
        }

        .calc-btn.num:hover {
            background: #eeeef5;
        }

        .calc-btn.op {
            background: #f0f0f5;
            color: #f5576c;
        }

        .calc-btn.op:hover {
            background: #e8e8f0;
        }

        .calc-btn.fn {
            background: #1a1a2e;
            color: #fff;
        }

        .calc-btn.fn:hover {
            background: #2a2a3e;
        }

        .calc-btn.equals {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }

        .calc-btn.equals:hover {
            opacity: 0.92;
        }

        .calc-btn.span-2 {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>📋 Todo Calculator</h1>
        <p class="subtitle">Manage tasks and crunch numbers</p>

        <div class="tabs">
            <button class="tab active" data-tab="todo" onclick="switchTab('todo')">To-Do</button>
            <button class="tab" data-tab="calc" onclick="switchTab('calc')">Calculator</button>
        </div>

        <!-- Todo Panel -->
        <div class="panel active" id="panel-todo">
            <div class="todo-input-row">
                <input type="text" id="todo-input" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTodo()">
                <button class="add-btn" onclick="addTodo()">Add</button>
            </div>
            <div class="todo-stats">
                <span><span class="count" id="todo-count">0/0</span> tasks</span>
                <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
            </div>
            <ul class="todo-list" id="todo-list">
                <li class="todo-empty">No tasks yet. Add one above!</li>
            </ul>
        </div>

        <!-- Calculator Panel -->
        <div class="panel" id="panel-calc">
            <div class="calc-display">
                <div class="expression" id="calc-expr"></div>
                <div class="result" id="calc-result">0</div>
            </div>
            <div class="calc-grid">
                <button class="calc-btn fn" onclick="calcClear()">AC</button>
                <button class="calc-btn fn" onclick="calcToggleSign()">±</button>
                <button class="calc-btn fn" onclick="calcPercent()">%</button>
                <button class="calc-btn op" onclick="calcOp('/')">÷</button>

                <button class="calc-btn num" onclick="calcDigit('7')">7</button>
                <button class="calc-btn num" onclick="calcDigit('8')">8</button>
                <button class="calc-btn num" onclick="calcDigit('9')">9</button>
                <button class="calc-btn op" onclick="calcOp('*')">×</button>

                <button class="calc-btn num" onclick="calcDigit('4')">4</button>
                <button class="calc-btn num" onclick="calcDigit('5')">5</button>
                <button class="calc-btn num" onclick="calcDigit('6')">6</button>
                <button class="calc-btn op" onclick="calcOp('-')">−</button>

                <button class="calc-btn num" onclick="calcDigit('1')">1</button>
                <button class="calc-btn num" onclick="calcDigit('2')">2</button>
                <button class="calc-btn num" onclick="calcDigit('3')">3</button>
                <button class="calc-btn op" onclick="calcOp('+')">+</button>

                <button class="calc-btn num span-2" onclick="calcDigit('0')">0</button>
                <button class="calc-btn num" onclick="calcDot()">.</button>
                <button class="calc-btn equals" onclick="calcEquals()">=</button>
            </div>
        </div>
    </div>

    <script>
        // ===== Tab Switching =====
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
            document.getElementById(`panel-${name}`).classList.add('active');
        }

        // ===== Todo =====
        let todos = [];

        function renderTodos() {
            const list = document.getElementById('todo-list');
            const count = document.getElementById('todo-count');
            const total = todos.length;
            const done = todos.filter(t => t.done).length;

            count.textContent = `${done}/${total}`;

            if (todos.length === 0) {
                list.innerHTML = '<li class="todo-empty">No tasks yet. Add one above!</li>';
                return;
            }

            list.innerHTML = todos.map((t, i) => `
                <li>
                    <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleTodo(${i})"></div>
                    <span class="todo-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</span>
                    <button class="delete-btn" onclick="deleteTodo(${i})">✕</button>
                </li>
            `).join('');
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (!text) return;
            todos.push({ text, done: false });
            input.value = '';
            renderTodos();
        }

        function toggleTodo(index) {
            todos[index].done = !todos[index].done;
            renderTodos();
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            renderTodos();
        }

        function clearCompleted() {
            todos = todos.filter(t => !t.done);
            renderTodos();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===== Calculator =====
        let calcCurrent = '0';
        let calcExpression = '';
        let calcOperator = null;
        let calcPrev = null;
        let calcResetNext = false;

        function updateCalcDisplay() {
            document.getElementById('calc-result').textContent = calcCurrent;
            document.getElementById('calc-expr').textContent = calcExpression;

            const resultEl = document.getElementById('calc-result');
            const len = calcCurrent.replace(/-/g, '').length;
            resultEl.style.fontSize = len > 12 ? '22px' : len > 8 ? '26px' : '32px';
        }

        function calcDigit(d) {
            if (calcResetNext) {
                calcCurrent = d;
                calcResetNext = false;
            } else {
                calcCurrent = calcCurrent === '0' ? d : calcCurrent + d;
            }
            updateCalcDisplay();
        }

        function calcDot() {
            if (calcResetNext) {
                calcCurrent = '0.';
                calcResetNext = false;
                updateCalcDisplay();
                return;
            }
            if (!calcCurrent.includes('.')) {
                calcCurrent += '.';
            }
            updateCalcDisplay();
        }

        function calcOp(op) {
            const num = parseFloat(calcCurrent);
            if (calcOperator && !calcResetNext) {
                calcPrev = calcCompute(calcPrev, num, calcOperator);
                calcExpression = formatNumber(calcPrev) + ' ' + getOpSymbol(op);
                calcCurrent = formatNumber(calcPrev);
            } else {
                calcPrev = num;
                calcExpression = formatNumber(num) + ' ' + getOpSymbol(op);
            }
            calcOperator = op;
            calcResetNext = true;
            updateCalcDisplay();
        }

        function calcEquals() {
            if (calcOperator === null) return;
            const num = parseFloat(calcCurrent);
            calcPrev = calcCompute(calcPrev, num, calcOperator);
            calcExpression = calcExpression + ' ' + formatNumber(num) + ' =';
            calcCurrent = formatNumber(calcPrev);
            calcOperator = null;
            calcResetNext = true;
            updateCalcDisplay();
        }

        function calcCompute(a, b, op) {
            switch (op) {
                case '+': return a + b;
                case '-': return a - b;
                case '*': return a * b;
                case '/': return b !== 0 ? a / b : 0;
                default: return b;
            }
        }

        function getOpSymbol(op) {
            switch (op) {
                case '+': return '+';
                case '-': return '−';
                case '*': return '×';
                case '/': return '÷';
                default: return op;
            }
        }

        function formatNumber(n) {
            if (isNaN(n) || !isFinite(n)) return '0';
            const str = n.toFixed(10);
            const trimmed = parseFloat(str).toString();
            return trimmed;
        }

        function calcClear() {
            calcCurrent = '0';
            calcExpression = '';
            calcOperator = null;
            calcPrev = null;
            calcResetNext = false;
            updateCalcDisplay();
        }

        function calcToggleSign() {
            if (calcCurrent !== '0') {
                calcCurrent = calcCurrent.startsWith('-') ? calcCurrent.slice(1) : '-' + calcCurrent;
            }
            updateCalcDisplay();
        }

        function calcPercent() {
            const num = parseFloat(calcCurrent) / 100;
            calcCurrent = formatNumber(num);
            updateCalcDisplay();
        }

        // Keyboard support for calculator
        document.addEventListener('keydown', function(e) {
            const calcPanel = document.getElementById('panel-calc');
            if (!calcPanel.classList.contains('active')) return;

            if (e.key >= '0' && e.key <= '9') { calcDigit(e.key); return; }
            if (e.key === '.') { calcDot(); return; }
            if (e.key === '+') { calcOp('+'); return; }
            if (e.key === '-') { calcOp('-'); return; }
            if (e.key === '*') { calcOp('*'); return; }
            if (e.key === '/') { e.preventDefault(); calcOp('/'); return; }
            if (e.key === 'Enter' || e.key === '=') { calcEquals(); return; }
            if (e.key === 'Escape') { calcClear(); return; }
            if (e.key === '%') { calcPercent(); return; }
        });
    </script>
</body>
</html>
