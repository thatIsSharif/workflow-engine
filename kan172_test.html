<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAN-172 Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .calculation {
            font-size: 24px;
            color: #333;
            margin-bottom: 16px;
        }
        .result {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        .label {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">KAN-172 Test Result</div>
        <div class="calculation">2 + 6 × 5 + 1 =</div>
        <div class="result">33</div>
    </div>
</body>
</html>
