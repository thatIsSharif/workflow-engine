<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question - KAN-127</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 540px;
            width: 90%;
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.8rem;
            color: #333;
        }
        .expression {
            font-size: 1.4rem;
            color: #666;
            margin: 1rem 0;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        .result {
            font-size: 3.5rem;
            font-weight: bold;
            color: #667eea;
            margin: 1rem 0 0.5rem;
        }
        .steps {
            font-size: 0.95rem;
            color: #888;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            line-height: 1.8;
        }
        .steps strong {
            color: #667eea;
        }
        .issue {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Question</h1>
        <div class="expression">131 + 5 - 5 + 7 + 5 &times; 9 - 1 + 4</div>
        <div class="result">186</div>
        <div class="steps">
            <strong>Step 1:</strong> Multiplication first &rarr; 5 &times; 9 = <strong>45</strong><br>
            <strong>Step 2:</strong> 131 + 5 - 5 + 7 + 45 - 1 + 4 = <strong>186</strong>
        </div>
        <div class="issue">KAN-127</div>
    </div>
</body>
</html>
