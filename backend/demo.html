<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo - KAN-108</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #ffffff;
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 480px;
        }
        h1 {
            margin: 0 0 1.5rem 0;
            color: #1f2937;
            font-size: 1.5rem;
        }
        .expression {
            font-size: 1.25rem;
            color: #4b5563;
            margin-bottom: 1rem;
        }
        .result {
            font-size: 3rem;
            font-weight: 700;
            color: #2563eb;
            margin: 1rem 0;
        }
        .label {
            font-size: 0.875rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>KAN-108 Demo</h1>
        <div class="label">Expression</div>
        <div class="expression">5 &times; 15 + 9 &minus; 1</div>
        <div class="label">Result</div>
        <div class="result">83</div>
    </div>
</body>
</html>
