<!DOCTYPE html>

  <title>Complex Sum</title>
</head>
<body>
  <h1>Complex Sum Result</h1>
  <p><strong>Expression:</strong> 5 + 7 + 5 &times; 9 - 1 + 4</p>
  <p><strong>Result:</strong> 60</p>
  <hr>
  <p><em>Calculation steps:</em> 5 + 7 + (5 &times; 9) - 1 + 4 = 5 + 7 + 45 - 1 + 4 = <strong>60</strong></p>
</body>
