  <p><strong>Expression:</strong> 1 + 5 - 5 + 7 + 5 &times; 9 - 1 + 4</p>

  <hr>
  <p><em>Calculation steps:</em> 1 + 5 - 5 + 7 + (5 &times; 9) - 1 + 4 = 1 + 5 - 5 + 7 + 45 - 1 + 4 = <strong>56</strong></p>
