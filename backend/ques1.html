<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ques1 - Calculation Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }
        .expression {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }
        .result {
            font-size: 4em;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }
        .label {
            font-size: 0.9em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">Calculation Result</div>
        <div class="expression">91300 + 1 + 15 - 52 + 117 + 5 × 9 - 11 + 140 + 1</div>
        <div class="result">91556</div>
        <div class="label">KAN-139 &bull; Ques1</div>
    </div>
</body>
</html>
