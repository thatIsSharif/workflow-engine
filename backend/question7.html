<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 7 - Calculation Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
        .expression {
            font-size: 1.5rem;
            color: #555;
            margin: 1rem 0;
        }
        .result {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            margin: 1rem 0;
        }
        .steps {
            text-align: left;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculation Result</h1>
        <div class="expression">131 + 15 - 52 + 17 + 5 &times; 9 - 11 + 140 + 1</div>
        <div class="result">= 286</div>
        <div class="steps">
            <strong>Step-by-step:</strong><br>
            131 + 15 = 146<br>
            146 - 52 = 94<br>
            94 + 17 = 111<br>
            5 &times; 9 = 45<br>
            111 + 45 = 156<br>
            156 - 11 = 145<br>
            145 + 140 = 285<br>
            285 + 1 = <strong>286</strong>
        </div>
    </div>
</body>
</html>
