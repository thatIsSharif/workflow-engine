<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo-Subtract</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px 60px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1 {
            margin: 0 0 24px 0;
            font-weight: 300;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
        .expression {
            font-size: 4rem;
            font-weight: 700;
            margin: 20px 0;
        }
        .result {
            font-size: 5rem;
            font-weight: 800;
            color: #ffd700;
            margin-top: 16px;
        }
        .label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>KAN-106 · Demo Subtract</h1>
        <div class="expression" id="expression">10 - 9 =</div>
        <div class="result" id="result">1</div>
        <div class="label">Output of 10 - 9</div>
    </div>
    <script>
        document.getElementById('result').textContent = 10 - 9;
    </script>
</body>
</html>
