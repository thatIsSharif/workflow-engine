<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAN-109 Test Sum</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 32px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 22px;
            color: #111827;
        }
        .subtitle {
            margin: 0 0 24px 0;
            color: #6b7280;
            font-size: 14px;
        }
        .expression {
            font-size: 28px;
            font-weight: 600;
            color: #2563eb;
            margin: 16px 0;
            font-family: "Courier New", monospace;
        }
        .equals {
            font-size: 24px;
            color: #6b7280;
        }
        .result {
            font-size: 56px;
            font-weight: 700;
            color: #16a34a;
            margin: 8px 0 24px 0;
        }
        .steps {
            text-align: left;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 14px;
            line-height: 1.8;
        }
        .steps div {
            font-family: "Courier New", monospace;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>KAN-109 Test Sum</h1>
        <p class="subtitle">Result of evaluating <code>5 * 15 + 9 - 1 * 6</code></p>

        <div class="expression">5 * 15 + 9 - 1 * 6</div>
        <div class="equals">=</div>
        <div class="result" id="result">78</div>

        <div class="steps">
            <div>5 * 15 = 75</div>
            <div>1 * 6 = 6</div>
            <div>75 + 9 = 84</div>
            <div>84 - 6 = 78</div>
        </div>
    </main>

    <script>
        // Compute and display the result dynamically as well,
        // so the file is self-validating when opened in a browser.
        (function () {
            const value = 5 * 15 + 9 - 1 * 6;
            const el = document.getElementById('result');
            if (el) {
                el.textContent = String(value);
            }
        })();
    </script>
</body>
</html>
