<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculation: 21 + 6 × 5 + 10</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .expression {
            font-size: 1.5rem;
            color: #555;
            margin-bottom: 0.5rem;
        }
        .result {
            font-size: 3rem;
            font-weight: bold;
            color: #1a73e8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="expression">21 + 6 × 5 + 10 =</div>
        <div class="result">61</div>
    </div>
</body>
</html>
